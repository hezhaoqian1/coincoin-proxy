<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">EAU sponsor badge</title>
  <desc id="desc">A neutral text badge for the European Alumni Union sponsor entry.</desc>
  <rect width="96" height="96" rx="18" fill="#EFF6FF"/>
  <rect x="8" y="8" width="80" height="80" rx="14" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="48" y="48" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="25" font-weight="700" fill="#1D4ED8">EAU</text>
  <text x="48" y="66" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2563EB">European Alumni Union</text>
</svg>
