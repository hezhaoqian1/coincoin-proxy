<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">CoinCoin.ai official cloud banner</title>
  <desc id="desc">Promotional banner for CoinCoin.ai, an AI model gateway with one key, unified billing, and $45 starter credits for new users.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="0.44" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#CBD5E1" stroke-width="1">
    <path d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200"/>
    <path d="M120 0V420M240 0V420M360 0V420M480 0V420M600 0V420M720 0V420M840 0V420M960 0V420M1080 0V420"/>
  </g>

  <g transform="translate(82 80)">
    <rect x="0" y="0" width="520" height="260" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="26" y="26" width="160" height="48" rx="24" fill="#FFF7ED" stroke="#FDBA74"/>
    <circle cx="50" cy="50" r="10" fill="#FB923C"/>
    <text x="72" y="56" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#9A3412">Official Cloud</text>
    <text x="28" y="118" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#64748B" letter-spacing="5">COINCOIN.AI</text>
    <text x="28" y="178" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#1E293B">AI Model Gateway</text>
    <text x="30" y="220" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#475569">One key. Unified billing. Control-plane ready.</text>
  </g>

  <g transform="translate(654 80)">
    <rect x="0" y="0" width="464" height="260" rx="28" fill="#0B1220" filter="url(#shadow)"/>
    <rect x="26" y="26" width="412" height="70" rx="18" fill="#BEF264"/>
    <text x="50" y="56" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#111827">New users get $45 starter credits</text>
    <text x="50" y="82" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1F2937">Register and start testing coding agents today</text>

    <rect x="26" y="118" width="190" height="110" rx="20" fill="#FFFFFF"/>
    <text x="56" y="154" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#111827">Claude Code</text>
    <text x="56" y="186" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#111827">Codex CLI</text>
    <text x="56" y="214" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#64748B">Gemini / cURL / SDK</text>

    <rect x="236" y="118" width="202" height="110" rx="20" fill="#111827" stroke="#334155"/>
    <text x="262" y="158" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#CBD5E1">Fast Channels</text>
    <text x="262" y="196" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#BEF264">99.9%</text>
  </g>

  <g transform="translate(386 344)">
    <rect x="0" y="0" width="204" height="54" rx="27" fill="url(#primary)"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">Start at coincoin.ai</text>
  </g>
  <g transform="translate(610 344)">
    <rect x="0" y="0" width="220" height="54" rx="27" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="110" y="35" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#334155">Get $45 credits</text>
  </g>
</svg>
